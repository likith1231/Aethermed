apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aethermed-hpa
  namespace: resilientcommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aethermed
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale up once average CPU across pods crosses 60% of the
          # `requests.cpu` value set in deployment.yaml (150m). This is
          # deliberately low so it's easy to trigger visibly during the k6
          # demo without needing a massive, expensive load test.
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
    scaleDown:
      # Slower scale-down so the demo recording has time to visibly show
      # the scaled-up state in Grafana before pods disappear again.
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
