apiVersion: apps/v1
kind: Deployment
metadata:
  name: aethermed
  namespace: resilientcommerce
  labels:
    app: aethermed
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aethermed
  template:
    metadata:
      labels:
        app: aethermed
    spec:
      containers:
        - name: aethermed
          image: aethermed:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: aethermed-config
            - secretRef:
                name: aethermed-secrets
          # Explicitly pointing OpenTelemetry to Jaeger inside the cluster
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger-otlp.observability.svc.cluster.local:4318/v1/traces"
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
