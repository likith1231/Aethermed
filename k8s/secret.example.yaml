# DO NOT fill this in and apply it directly — that would put real secrets
# into a YAML file that's easy to accidentally commit to git.
#
# This file exists purely as documentation of which keys the Deployment
# expects in the "aethermed-secrets" Secret. To actually create it, use the
# imperative kubectl command below instead (see k8s/README.md):
#
#   kubectl create secret generic aethermed-secrets \
#     --namespace resilientcommerce \
#     --from-literal=DATABASE_URL='your-real-neon-connection-string' \
#     --from-literal=NEXTAUTH_SECRET='your-real-secret'
#
apiVersion: v1
kind: Secret
metadata:
  name: aethermed-secrets
  namespace: resilientcommerce
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_ME"
  NEXTAUTH_SECRET: "REPLACE_ME"
