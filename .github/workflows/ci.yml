name: ResilientCommerce CI/CD

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    test-and-build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            # We will add Codecov here shortly
            - name: Run Tests
              run: echo "Running tests..." # Replace with 'npm test' when tests are ready

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker Image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: false # We will set this to true once we connect a container registry
                  tags: aethermed:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
