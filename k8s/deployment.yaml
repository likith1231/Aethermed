apiVersion: apps/v1
kind: Deployment
metadata:
  name: aethermed
  namespace: resilientcommerce
  labels:
    app: aethermed
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aethermed
  template:
    metadata:
      labels:
        app: aethermed
    spec:
      containers:
        - name: aethermed
          image: aethermed:local
          # IfNotPresent: this image was loaded directly into the Kind node
          # via `kind load docker-image`, not pulled from a registry. Never
          # use `imagePullPolicy: Always` here or the kubelet will try (and
          # fail) to pull a non-existent "aethermed:local" from Docker Hub.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: aethermed-config
            - secretRef:
                name: aethermed-secrets
          # Explicitly pointing OpenTelemetry to Jaeger inside the cluster
          # Removed /v1/traces to prevent the SDK from double-appending it
          env:
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://jaeger-otlp.observability.svc.cluster.local:4318/v1/traces"
          # HPA cannot compute a CPU percentage without a `requests` value to
          # measure against — this is a hard prerequisite, not tuning.
          # Limits are set generously since this is a demo, not tuned prod.
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
